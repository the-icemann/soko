networks:
  soko_net:
    driver: bridge
  soko-ml-bridge:
    external: true

volumes:
  auth_db_data:
  user_db_data:
  produce_db_data:
  order_db_data:
  payment_db_data:
  notification_db_data:
  message_db_data:
  blog_db_data:
  ussd_db_data:
  redis_data:


services:

  # ─────────────────────────────────────────
  # API GATEWAY (Nginx)
  # ─────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: api_gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth_service
      - user_service
      - produce_service
      - order_service
      - payment_service
      - notification_service
      - message_service
      - blog_service
      - ussd_service
    networks:
      - soko_net
      - soko-ml-bridge
    restart: on-failure

  # ─────────────────────────────────────────
  # REDIS (shared cache)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
    networks:
      - soko_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: on-failure

  # ─────────────────────────────────────────
  # AUTH SERVICE  :8001
  # ─────────────────────────────────────────
  auth_db:
    image: postgres:15-alpine
    container_name: auth_db
    environment:
      POSTGRES_USER:     auth_user
      POSTGRES_PASSWORD: ${AUTH_DB_PASS:-auth_pass}
      POSTGRES_DB:       auth_db
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - soko_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth_service:
    build: ./services/auth
    container_name: auth_service
    ports:
      - "127.0.0.1:8001:8001"
    env_file: ./services/auth/.env
    environment:
      DATABASE_URL:      postgresql://auth_user:${AUTH_DB_PASS:-auth_pass}@auth_db:5432/auth_db
      USER_SERVICE_URL:  http://user_service:8002
    depends_on:
      auth_db:
        condition: service_healthy
    networks:
      - soko_net
    restart: on-failure

  # ─────────────────────────────────────────
  # USER SERVICE  :8002
  # ─────────────────────────────────────────
  user_db:
    image: postgres:15-alpine
    container_name: user_db
    environment:
      POSTGRES_USER:     user_user
      POSTGRES_PASSWORD: ${USER_DB_PASS:-user_pass}
      POSTGRES_DB:       user_db
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - soko_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_user -d user_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  user_service:
    build: ./services/user
    container_name: user_service
    ports:
      - "127.0.0.1:8002:8002"
    env_file: ./services/user/.env
    environment:
      DATABASE_URL: postgresql://user_user:${USER_DB_PASS:-user_pass}@user_db:5432/user_db
    depends_on:
      user_db:
        condition: service_healthy
    networks:
      - soko_net
      - soko-ml-bridge
    restart: on-failure

  # ─────────────────────────────────────────
  # PRODUCE SERVICE  :8003
  # ─────────────────────────────────────────
  produce_db:
    image: postgres:15-alpine
    container_name: produce_db
    environment:
      POSTGRES_USER:     produce_user
      POSTGRES_PASSWORD: ${PRODUCE_DB_PASS:-produce_pass}
      POSTGRES_DB:       produce_db
    volumes:
      - produce_db_data:/var/lib/postgresql/data
    networks:
      - soko_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U produce_user -d produce_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  produce_service:
    build: ./services/produce
    container_name: produce_service
    ports:
      - "127.0.0.1:8003:8003"
    env_file: ./services/produce/.env
    environment:
      DATABASE_URL:      postgresql://produce_user:${PRODUCE_DB_PASS:-produce_pass}@produce_db:5432/produce_db
      REDIS_URL:         redis://redis:6379/0
      USER_SERVICE_URL:  http://user_service:8002
      ML_GATEWAY_URL:    http://ml-gateway:8000
    depends_on:
      produce_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soko_net
      - soko-ml-bridge
    restart: on-failure

  # ─────────────────────────────────────────
  # ORDER SERVICE  :8004
  # ─────────────────────────────────────────
  order_db:
    image: postgres:15-alpine
    container_name: order_db
    environment:
      POSTGRES_USER:     order_user
      POSTGRES_PASSWORD: ${ORDER_DB_PASS:-order_pass}
      POSTGRES_DB:       order_db
    volumes:
      - order_db_data:/var/lib/postgresql/data
    networks:
      - soko_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U order_user -d order_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  order_service:
    build: ./services/order
    container_name: order_service
    ports:
      - "127.0.0.1:8004:8004"
    env_file: ./services/order/.env
    environment:
      DATABASE_URL:              postgresql://order_user:${ORDER_DB_PASS:-order_pass}@order_db:5432/order_db
      PRODUCE_SERVICE_URL:       http://produce_service:8003
      USER_SERVICE_URL:          http://user_service:8002
      PAYMENT_SERVICE_URL:       http://payment_service:8005
      NOTIFICATION_SERVICE_URL:  http://notification_service:8007
      KAFKA_BOOTSTRAP_SERVERS:   kafka:9092
      KAFKA_TRANSACTION_TOPIC:   soko.transactions
    depends_on:
      order_db:
        condition: service_healthy
      produce_service:
        condition: service_started
      payment_service:
        condition: service_started
    networks:
      - soko_net
      - soko-ml-bridge
    restart: on-failure

  # ─────────────────────────────────────────
  # PAYMENT SERVICE  :8005
  # ─────────────────────────────────────────
  payment_db:
    image: postgres:15-alpine
    container_name: payment_db
    environment:
      POSTGRES_USER:     payment_user
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASS:-payment_pass}
      POSTGRES_DB:       payment_db
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    networks:
      - soko_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment_user -d payment_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment_service:
    build: ./services/payment
    container_name: payment_service
    ports:
      - "127.0.0.1:8005:8005"
    env_file: ./services/payment/.env
    environment:
      DATABASE_URL:             postgresql://payment_user:${PAYMENT_DB_PASS:-payment_pass}@payment_db:5432/payment_db
      ORDER_SERVICE_URL:        http://order_service:8004
      USER_SERVICE_URL:         http://user_service:8002
      NOTIFICATION_SERVICE_URL: http://notification_service:8007
    depends_on:
      payment_db:
        condition: service_healthy
    networks:
      - soko_net
    restart: on-failure

  # ─────────────────────────────────────────
  # MESSAGE SERVICE  :8006
  # ─────────────────────────────────────────
  message_db:
    image: postgres:15-alpine
    container_name: message_db
    environment:
      POSTGRES_USER:     message_user
      POSTGRES_PASSWORD: ${MESSAGE_DB_PASS:-message_pass}
      POSTGRES_DB:       message_db
    volumes:
      - message_db_data:/var/lib/postgresql/data
    networks:
      - soko_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U message_user -d message_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  message_service:
    build: ./services/message
    container_name: message_service
    ports:
      - "127.0.0.1:8006:8006"
    env_file: ./services/message/.env
    environment:
      DATABASE_URL:             postgresql://message_user:${MESSAGE_DB_PASS:-message_pass}@message_db:5432/message_db
      USER_SERVICE_URL:         http://user_service:8002
      PRODUCE_SERVICE_URL:      http://produce_service:8003
      NOTIFICATION_SERVICE_URL: http://notification_service:8007
    depends_on:
      message_db:
        condition: service_healthy
    networks:
      - soko_net
    restart: on-failure

  # ─────────────────────────────────────────
  # NOTIFICATION SERVICE  :8007
  # ─────────────────────────────────────────
  notification_db:
    image: postgres:15-alpine
    container_name: notification_db
    environment:
      POSTGRES_USER:     notification_user
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASS:-notification_pass}
      POSTGRES_DB:       notification_db
    volumes:
      - notification_db_data:/var/lib/postgresql/data
    networks:
      - soko_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notification_user -d notification_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  notification_service:
    build: ./services/notification
    container_name: notification_service
    ports:
      - "127.0.0.1:8007:8007"
    env_file: ./services/notification/.env
    environment:
      DATABASE_URL:     postgresql://notification_user:${NOTIFICATION_DB_PASS:-notification_pass}@notification_db:5432/notification_db
      USER_SERVICE_URL: http://user_service:8002
    depends_on:
      notification_db:
        condition: service_healthy
    networks:
      - soko_net
      - soko-ml-bridge
    restart: on-failure

  # ─────────────────────────────────────────
  # BLOG SERVICE  :8008
  # ─────────────────────────────────────────
  blog_db:
    image: postgres:15-alpine
    container_name: blog_db
    environment:
      POSTGRES_USER:     blog_user
      POSTGRES_PASSWORD: ${BLOG_DB_PASS:-blog_pass}
      POSTGRES_DB:       blog_db
    volumes:
      - blog_db_data:/var/lib/postgresql/data
    networks:
      - soko_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog_user -d blog_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  blog_service:
    build: ./services/blog
    container_name: blog_service
    ports:
      - "127.0.0.1:8008:8008"
    env_file: ./services/blog/.env
    environment:
      DATABASE_URL:     postgresql://blog_user:${BLOG_DB_PASS:-blog_pass}@blog_db:5432/blog_db
      REDIS_URL:        redis://redis:6379/1
      USER_SERVICE_URL: http://user_service:8002
    depends_on:
      blog_db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soko_net
    restart: on-failure

  # ─────────────────────────────────────────
  # USSD SERVICE  :8009
  # ─────────────────────────────────────────
  ussd_db:
    image: postgres:15-alpine
    container_name: ussd_db
    environment:
      POSTGRES_USER:     ussd_user
      POSTGRES_PASSWORD: ${USSD_DB_PASS:-ussd_pass}
      POSTGRES_DB:       ussd_db
    volumes:
      - ussd_db_data:/var/lib/postgresql/data
    networks:
      - soko_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ussd_user -d ussd_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  ussd_service:
    build: ./services/ussd
    container_name: ussd_service
    ports:
      - "127.0.0.1:8009:8009"
    env_file: ./services/ussd/.env
    environment:
      DATABASE_URL:             postgresql://ussd_user:${USSD_DB_PASS:-ussd_pass}@ussd_db:5432/ussd_db
      PRODUCE_SERVICE_URL:      http://produce_service:8003
      ORDER_SERVICE_URL:        http://order_service:8004
      AUTH_SERVICE_URL:         http://auth_service:8001
      USER_SERVICE_URL:         http://user_service:8002
      NOTIFICATION_SERVICE_URL: http://notification_service:8007
    depends_on:
      ussd_db:
        condition: service_healthy
      auth_service:
        condition: service_started
      produce_service:
        condition: service_started
    networks:
      - soko_net
    restart: on-failure