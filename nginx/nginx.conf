events {
    worker_connections 1024;
}

http {

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;

    resolver 127.0.0.11 valid=30s;

    # ── Path-stripping maps ────────────────────────────────────────────────────
    # When proxy_pass uses a variable, Nginx does NOT strip the location prefix
    # automatically. These maps pre-compute the upstream path from $request_uri
    # so each proxy_pass can forward the correct path while still using a
    # variable host (which keeps Docker DNS re-resolution alive).
    # ──────────────────────────────────────────────────────────────────────────

    map $request_uri $auth_upstream_path {
        ~^/auth(/.*)?$     $1;
        default            /;
    }
    map $request_uri $oauth_upstream_path {
        ~^/oauth(/.*)?$    $1;
        default            /;
    }
    map $request_uri $users_upstream_path {
        ~^/users(/.*)?$    $1;
        default            /;
    }
    map $request_uri $listings_upstream_path {
        ~^/listings(/.*)?$ $1;
        default            /;
    }
    map $request_uri $orders_upstream_path {
        ~^/orders(/.*)?$   $1;
        default            /;
    }
    map $request_uri $payments_upstream_path {
        ~^/payments(/.*)?$ $1;
        default            /;
    }
    map $request_uri $webhook_upstream_path {
        ~^/webhook(/.*)?$  $1;
        default            /;
    }
    # WebSocket path must be checked before the generic /message/ prefix
    map $request_uri $message_upstream_path {
        ~^/message/ws(/.*)?$  /ws$1;
        ~^/message(/.*)?$     $1;
        default               /;
    }
    map $request_uri $notif_upstream_path {
        ~^/notifications/ws(/.*)?$  /ws$1;
        ~^/notifications(/.*)?$     $1;
        default                     /;
    }
    map $request_uri $posts_upstream_path {
        ~^/posts(/.*)?$    $1;
        default            /;
    }
    map $request_uri $ussd_upstream_path {
        ~^/ussd(/.*)?$     $1;
        default            /;
    }
    map $request_uri $rec_upstream_path {
        ~^/recommendations(/.*)?$  /recommend$1;
        default                    /;
    }
    map $request_uri $ml_price_upstream_path {
        ~^/ml/price(/.*)?$   /price$1;
        default              /;
    }
    map $request_uri $ml_rec_upstream_path {
        ~^/ml/recommend(/.*)?$  /recommend$1;
        default                 /;
    }
    map $request_uri $ml_location_upstream_path {
        ~^/ml/location(/.*)?$   /location$1;
        default                  /;
    }

    map $http_origin $cors_origin {
        ~^https?://localhost:(3000|5173|4173)$  $http_origin;
        ~^https://[a-z0-9]+\.cloudfront\.net$   $http_origin;
        # Uncomment when domain is live:
        # https://app.soko-ug.com               $http_origin;
        default                                  "";
    }

    server {
        listen 80;

        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-User-Id, X-User-Role" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-User-Id, X-User-Role" always;
            add_header Access-Control-Allow-Credentials "true" always;
            return 204;
        }

        location = /_verify_token {
            internal;
            set $auth_svc "auth_service:8001";
            proxy_pass              http://$auth_svc/verify-token;
            proxy_set_header        Authorization $http_authorization;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Host $host;
        }

        location = /_verify_token_optional {
            internal;
            set $auth_svc "auth_service:8001";
            proxy_pass              http://$auth_svc/verify-token-optional;
            proxy_set_header        Authorization $http_authorization;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Host $host;
        }

        location @error401 {
            default_type application/json;
            return 401 '{"detail":"Unauthorized"}';
        }
        location @error403 {
            default_type application/json;
            return 403 '{"detail":"Forbidden"}';
        }

        location = /auth/docs {
            set $auth_svc "auth_service:8001";
            proxy_pass http://$auth_svc/docs;
            proxy_set_header Host $host;
        }
        location = /auth/redoc {
            set $auth_svc "auth_service:8001";
            proxy_pass http://$auth_svc/redoc;
            proxy_set_header Host $host;
        }
        location = /auth/openapi.json {
            set $auth_svc "auth_service:8001";
            proxy_pass http://$auth_svc/openapi.json;
            proxy_set_header Host $host;
        }

        location /auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $auth_svc "auth_service:8001";
            proxy_pass       http://$auth_svc$auth_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /oauth/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $auth_svc "auth_service:8001";
            proxy_pass       http://$auth_svc$oauth_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /users/docs {
            set $user_svc "user_service:8002";
            proxy_pass http://$user_svc/docs;
            proxy_set_header Host $host;
        }
        location = /users/redoc {
            set $user_svc "user_service:8002";
            proxy_pass http://$user_svc/redoc;
            proxy_set_header Host $host;
        }
        location = /users/openapi.json {
            set $user_svc "user_service:8002";
            proxy_pass http://$user_svc/openapi.json;
            proxy_set_header Host $host;
        }

        location /users/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request     /_verify_token;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            error_page 401 = @error401;
            error_page 403 = @error403;
            set $user_svc "user_service:8002";
            proxy_pass       http://$user_svc$users_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location = /listings/docs {
            set $produce_svc "produce_service:8003";
            proxy_pass http://$produce_svc/docs;
            proxy_set_header Host $host;
        }
        location = /listings/redoc {
            set $produce_svc "produce_service:8003";
            proxy_pass http://$produce_svc/redoc;
            proxy_set_header Host $host;
        }
        location = /listings/openapi.json {
            set $produce_svc "produce_service:8003";
            proxy_pass http://$produce_svc/openapi.json;
            proxy_set_header Host $host;
        }

        location /listings/ {
            limit_req zone=api_limit burst=20 nodelay;
            client_max_body_size 20M;
            auth_request     /_verify_token_optional;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            set $produce_svc "produce_service:8003";
            proxy_pass       http://$produce_svc$listings_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location = /orders/docs {
            set $order_svc "order_service:8004";
            proxy_pass http://$order_svc/docs;
            proxy_set_header Host $host;
        }
        location = /orders/redoc {
            set $order_svc "order_service:8004";
            proxy_pass http://$order_svc/redoc;
            proxy_set_header Host $host;
        }
        location = /orders/openapi.json {
            set $order_svc "order_service:8004";
            proxy_pass http://$order_svc/openapi.json;
            proxy_set_header Host $host;
        }

        location /orders/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request     /_verify_token;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            error_page 401 = @error401;
            error_page 403 = @error403;
            set $order_svc "order_service:8004";
            proxy_pass       http://$order_svc$orders_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location = /payments/docs {
            set $payment_svc "payment_service:8005";
            proxy_pass http://$payment_svc/docs;
            proxy_set_header Host $host;
        }
        location = /payments/redoc {
            set $payment_svc "payment_service:8005";
            proxy_pass http://$payment_svc/redoc;
            proxy_set_header Host $host;
        }
        location = /payments/openapi.json {
            set $payment_svc "payment_service:8005";
            proxy_pass http://$payment_svc/openapi.json;
            proxy_set_header Host $host;
        }

        location /payments/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request     /_verify_token;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            error_page 401 = @error401;
            error_page 403 = @error403;
            set $payment_svc "payment_service:8005";
            proxy_pass       http://$payment_svc$payments_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location /webhook/ {
            set $payment_svc "payment_service:8005";
            proxy_pass       http://$payment_svc$webhook_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /message/docs {
            set $message_svc "message_service:8006";
            proxy_pass http://$message_svc/docs;
            proxy_set_header Host $host;
        }
        location = /message/redoc {
            set $message_svc "message_service:8006";
            proxy_pass http://$message_svc/redoc;
            proxy_set_header Host $host;
        }
        location = /message/openapi.json {
            set $message_svc "message_service:8006";
            proxy_pass http://$message_svc/openapi.json;
            proxy_set_header Host $host;
        }

        location /message/ws/ {
            set $message_svc "message_service:8006";
            proxy_pass         http://$message_svc$message_upstream_path;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /message/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request     /_verify_token;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            error_page 401 = @error401;
            error_page 403 = @error403;
            set $message_svc "message_service:8006";
            proxy_pass       http://$message_svc$message_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location = /notifications/docs {
            set $notif_svc "notification_service:8007";
            proxy_pass http://$notif_svc/docs;
            proxy_set_header Host $host;
        }
        location = /notifications/redoc {
            set $notif_svc "notification_service:8007";
            proxy_pass http://$notif_svc/redoc;
            proxy_set_header Host $host;
        }
        location = /notifications/openapi.json {
            set $notif_svc "notification_service:8007";
            proxy_pass http://$notif_svc/openapi.json;
            proxy_set_header Host $host;
        }

        location /notifications/ws/ {
            set $notif_svc "notification_service:8007";
            proxy_pass         http://$notif_svc$notif_upstream_path;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /notifications/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request     /_verify_token;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            error_page 401 = @error401;
            error_page 403 = @error403;
            set $notif_svc "notification_service:8007";
            proxy_pass       http://$notif_svc$notif_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location = /posts/docs {
            set $blog_svc "blog_service:8008";
            proxy_pass http://$blog_svc/docs;
            proxy_set_header Host $host;
        }
        location = /posts/redoc {
            set $blog_svc "blog_service:8008";
            proxy_pass http://$blog_svc/redoc;
            proxy_set_header Host $host;
        }
        location = /posts/openapi.json {
            set $blog_svc "blog_service:8008";
            proxy_pass http://$blog_svc/openapi.json;
            proxy_set_header Host $host;
        }

        location /posts/ {
            limit_req zone=api_limit burst=20 nodelay;
            client_max_body_size 10M;
            auth_request     /_verify_token_optional;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            set $blog_svc "blog_service:8008";
            proxy_pass       http://$blog_svc$posts_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location /ussd/ {
            set $ussd_svc "ussd_service:8009";
            proxy_pass       http://$ussd_svc$ussd_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ════════════════════════════════════════
        # RECOMMENDATION SERVICE — routed via ml_gateway
        # /recommendations/* is a convenience alias for /ml/recommend/*
        # Both require a valid JWT — personal data must never be public.
        # ════════════════════════════════════════
        location /recommendations/ {
            limit_req zone=api_limit burst=20 nodelay;

            auth_request     /_verify_token;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            error_page 401 = @error401;
            error_page 403 = @error403;

            set $ml_gw "ml-gateway:8000";
            proxy_pass       http://$ml_gw$rec_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
        }

        # ════════════════════════════════════════
        # ML GATEWAY
        # /ml/price/*      — price predictions  (public)
        # /ml/recommend/*  — recommendations    (protected)
        # ════════════════════════════════════════

        location /ml/price/ {
            limit_req zone=api_limit burst=20 nodelay;
            set $ml_gw "ml-gateway:8000";
            proxy_pass       http://$ml_gw$ml_price_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /ml/location/ {
            limit_req zone=api_limit burst=30 nodelay;
            auth_request     /_verify_token;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            error_page 401 = @error401;
            error_page 403 = @error403;
            set $ml_gw "ml-gateway:8000";
            proxy_pass       http://$ml_gw$ml_location_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
        }

        location /ml/recommend/ {
            limit_req zone=api_limit burst=20 nodelay;

            auth_request     /_verify_token;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            error_page 401 = @error401;
            error_page 403 = @error403;

            set $ml_gw "ml-gateway:8000";
            proxy_pass       http://$ml_gw$ml_rec_upstream_path;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
        }

        # ════════════════════════════════════════
        # HEALTH CHECK
        # ════════════════════════════════════════
        location /health {
            return 200 "Soko API Gateway OK\n";
            add_header Content-Type text/plain;
        }
    }
}
