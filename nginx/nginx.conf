events {
    worker_connections 1024;
}

http {

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    upstream auth_service           { server auth_service:8001; }
    upstream user_service           { server user_service:8002; }
    upstream produce_service        { server produce_service:8003; }
    upstream order_service          { server order_service:8004; }
    upstream payment_service        { server payment_service:8005; }
    upstream message_service        { server message_service:8006; }
    upstream notification_service   { server notification_service:8007; }
    upstream blog_service           { server blog_service:8008; }
    upstream ussd_service           { server ussd_service:8009; }
    upstream recommendation_service { server recommendation_service:8010; }
    upstream ml_gateway             { server ml-gateway:8000; }

    server {
        listen 80;

        set $cors_origin "";
        if ($http_origin ~* "^https?://localhost:(3000|5173|4173)$") {
            set $cors_origin $http_origin;
        }
        add_header Access-Control-Allow-Origin      $cors_origin always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, X-User-Id, X-User-Role" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) { return 204; }

        location = /_verify_token {
            internal;
            proxy_pass              http://auth_service/verify-token;
            proxy_set_header        Authorization $http_authorization;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Host $host;
        }

        location = /_verify_token_optional {
            internal;
            proxy_pass              http://auth_service/verify-token-optional;
            proxy_set_header        Authorization $http_authorization;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            proxy_set_header        Host $host;
        }

        location @error401 {
            default_type application/json;
            return 401 '{"detail":"Unauthorized"}';
        }
        location @error403 {
            default_type application/json;
            return 403 '{"detail":"Forbidden"}';
        }

        location = /auth/docs         { proxy_pass http://auth_service/docs;         proxy_set_header Host $host; }
        location = /auth/redoc        { proxy_pass http://auth_service/redoc;        proxy_set_header Host $host; }
        location = /auth/openapi.json { proxy_pass http://auth_service/openapi.json; proxy_set_header Host $host; }

        location /auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://auth_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /oauth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://auth_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /users/docs         { proxy_pass http://user_service/docs;         proxy_set_header Host $host; }
        location = /users/redoc        { proxy_pass http://user_service/redoc;        proxy_set_header Host $host; }
        location = /users/openapi.json { proxy_pass http://user_service/openapi.json; proxy_set_header Host $host; }

        location /users/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request     /_verify_token;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            error_page 401 = @error401;
            error_page 403 = @error403;
            proxy_pass       http://user_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location = /listings/docs         { proxy_pass http://produce_service/docs;         proxy_set_header Host $host; }
        location = /listings/redoc        { proxy_pass http://produce_service/redoc;        proxy_set_header Host $host; }
        location = /listings/openapi.json { proxy_pass http://produce_service/openapi.json; proxy_set_header Host $host; }

        location /listings/ {
            limit_req zone=api_limit burst=20 nodelay;
            client_max_body_size 20M;
            auth_request     /_verify_token_optional;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            proxy_pass       http://produce_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location = /orders/docs         { proxy_pass http://order_service/docs;         proxy_set_header Host $host; }
        location = /orders/redoc        { proxy_pass http://order_service/redoc;        proxy_set_header Host $host; }
        location = /orders/openapi.json { proxy_pass http://order_service/openapi.json; proxy_set_header Host $host; }

        location /orders/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request     /_verify_token;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            error_page 401 = @error401;
            error_page 403 = @error403;
            proxy_pass       http://order_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location = /payments/docs         { proxy_pass http://payment_service/docs;         proxy_set_header Host $host; }
        location = /payments/redoc        { proxy_pass http://payment_service/redoc;        proxy_set_header Host $host; }
        location = /payments/openapi.json { proxy_pass http://payment_service/openapi.json; proxy_set_header Host $host; }

        location /payments/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request     /_verify_token;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            error_page 401 = @error401;
            error_page 403 = @error403;
            proxy_pass       http://payment_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location /webhook/ {
            proxy_pass       http://payment_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location = /message/docs         { proxy_pass http://message_service/docs;         proxy_set_header Host $host; }
        location = /message/redoc        { proxy_pass http://message_service/redoc;        proxy_set_header Host $host; }
        location = /message/openapi.json { proxy_pass http://message_service/openapi.json; proxy_set_header Host $host; }

        location /message/ws/ {
            proxy_pass         http://message_service/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /message/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request     /_verify_token;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            error_page 401 = @error401;
            error_page 403 = @error403;
            proxy_pass       http://message_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location = /notifications/docs         { proxy_pass http://notification_service/docs;         proxy_set_header Host $host; }
        location = /notifications/redoc        { proxy_pass http://notification_service/redoc;        proxy_set_header Host $host; }
        location = /notifications/openapi.json { proxy_pass http://notification_service/openapi.json; proxy_set_header Host $host; }

        location /notifications/ws/ {
            proxy_pass         http://notification_service/ws/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /notifications/ {
            limit_req zone=api_limit burst=20 nodelay;
            auth_request     /_verify_token;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            error_page 401 = @error401;
            error_page 403 = @error403;
            proxy_pass       http://notification_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location = /posts/docs         { proxy_pass http://blog_service/docs;         proxy_set_header Host $host; }
        location = /posts/redoc        { proxy_pass http://blog_service/redoc;        proxy_set_header Host $host; }
        location = /posts/openapi.json { proxy_pass http://blog_service/openapi.json; proxy_set_header Host $host; }

        location /posts/ {
            limit_req zone=api_limit burst=20 nodelay;
            client_max_body_size 10M;
            auth_request     /_verify_token_optional;
            auth_request_set $user_id    $upstream_http_x_user_id;
            auth_request_set $user_role  $upstream_http_x_user_role;
            auth_request_set $user_email $upstream_http_x_user_email;
            proxy_pass       http://blog_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
            proxy_set_header X-User-Email    $user_email;
            proxy_set_header Authorization   $http_authorization;
        }

        location /ussd/ {
            proxy_pass       http://ussd_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ════════════════════════════════════════
        # RECOMMENDATION SERVICE — all public
        # ════════════════════════════════════════
        location = /recommendations/docs        { proxy_pass http://recommendation_service/docs;         proxy_set_header Host $host; }
        location = /recommendations/redoc       { proxy_pass http://recommendation_service/redoc;        proxy_set_header Host $host; }
        location = /recommendations/openapi.json { proxy_pass http://recommendation_service/openapi.json; proxy_set_header Host $host; }

        location /recommendations/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://recommendation_service/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ════════════════════════════════════════
        # ML GATEWAY
        # /ml/price/*      — price predictions  (public — useful for price discovery)
        # /ml/recommend/*  — recommendations    (protected — personal to the user)
        # ════════════════════════════════════════

        # Price endpoints — public so the frontend can show market prices without login
        location /ml/price/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass       http://ml_gateway/price/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Recommendation endpoints — require a valid token
        location /ml/recommend/ {
            limit_req zone=api_limit burst=20 nodelay;

            auth_request     /_verify_token;
            auth_request_set $user_id   $upstream_http_x_user_id;
            auth_request_set $user_role $upstream_http_x_user_role;
            error_page 401 = @error401;
            error_page 403 = @error403;

            proxy_pass       http://ml_gateway/recommend/;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-User-Id       $user_id;
            proxy_set_header X-User-Role     $user_role;
        }

        # ════════════════════════════════════════
        # HEALTH CHECK
        # ════════════════════════════════════════
        location /health {
            return 200 "Soko API Gateway OK\n";
            add_header Content-Type text/plain;
        }
    }
}