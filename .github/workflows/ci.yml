name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint all services
        run: |
          ruff check \
            services/auth/app \
            services/user/app \
            services/produce/app \
            services/order/app \
            services/payment/app \
            services/notification/app \
            services/message/app \
            services/blog/app \
            services/ussd/app

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      # CI uses dev defaults — no real secrets needed
      - name: Create bridge network for ML stack
        run: docker network create soko-ml-bridge || true

      - name: Build and start services
        run: docker compose up --build -d
        timeout-minutes: 15

      - name: Wait for all core services to be healthy
        run: |
          echo "Waiting for core services..."
          for port in 8001 8002 8003 8004 8005 8007 8008 8009; do
            for i in $(seq 1 40); do
              if curl -sf http://localhost:${port}/health > /dev/null 2>&1; then
                echo "  :${port} up"
                break
              fi
              if [ "$i" = "40" ]; then
                echo "  :${port} timed out"
                docker compose logs
                exit 1
              fi
              sleep 5
            done
          done
          echo "All services ready."

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r tests/integration/requirements.txt

      - name: Run integration tests
        run: python -m pytest tests/integration/ -v --tb=short

      - name: Dump service logs on failure
        if: failure()
        run: docker compose logs
