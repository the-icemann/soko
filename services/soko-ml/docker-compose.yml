networks:
  soko-ml-network:
    driver: bridge
  soko-ml-bridge:
    external: true

volumes:
  redis-data:
  kafka-data:
  zookeeper-data:
  soko_ml_db_data:

services:
  # ── Infrastructure ────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: soko-ml-zookeeper
    networks:
      - soko-ml-network
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: soko-ml-kafka
    networks:
      soko-ml-network: {}
      soko-ml-bridge:
        aliases:
          - kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 30s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: soko-ml-kafka-init
    networks:
      - soko-ml-network
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic soko.transactions     --partitions 6 --replication-factor 1 --config retention.ms=604800000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic soko.interactions    --partitions 6 --replication-factor 1 --config retention.ms=259200000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic soko.price.requests  --partitions 3 --replication-factor 1 --config retention.ms=86400000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic soko.price.results   --partitions 3 --replication-factor 1 --config retention.ms=86400000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic soko.ml.events       --partitions 2 --replication-factor 1 --config retention.ms=1209600000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic soko.dlq             --partitions 2 --replication-factor 1 --config retention.ms=2592000000
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic soko.gaps            --partitions 2 --replication-factor 1 --config retention.ms=2592000000
      echo 'All Kafka topics created.'
      "
    restart: on-failure

  # ── ML Feature Store (Postgres) ───────────────────────────────────────────────

  soko-ml-db:
    image: postgres:16-alpine
    container_name: soko-ml-db
    hostname: soko-ml-db
    networks:
      - soko-ml-network
    environment:
      POSTGRES_DB:       soko_ml_db
      POSTGRES_USER:     ${POSTGRES_USER:-soko_ml}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - soko_ml_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-soko_ml} -d soko_ml_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  db-init:
    image: postgres:16-alpine
    container_name: soko-ml-db-init
    networks:
      - soko-ml-network
    depends_on:
      soko-ml-db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-changeme}
    command: >
      sh -c "psql -h soko-ml-db -U ${POSTGRES_USER:-soko_ml} -d soko_ml_db -f /schema/schema.sql && echo 'Schema applied.'"
    volumes:
      - ./db/schema.sql:/schema/schema.sql:ro
    restart: on-failure

  redis:
    image: redis:7-alpine
    hostname: redis
    container_name: soko-ml-redis
    networks:
      - soko-ml-network
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── ML Services ───────────────────────────────────────────────────────────────

  price-prediction-service:
    build:
      context: ./price-prediction-service
      dockerfile: Dockerfile
    container_name: soko-ml-price
    hostname: price-prediction-service
    networks:
      - soko-ml-network
    ports:
      - "${PRICE_SERVICE_PORT:-8094}:8001"
    environment:
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_PRICE_REQUEST_TOPIC=${KAFKA_PRICE_REQUEST_TOPIC:-soko.price.requests}
      - KAFKA_PRICE_RESULT_TOPIC=${KAFKA_PRICE_RESULT_TOPIC:-soko.price.results}
      - MODEL_DIR=${MODEL_DIR:-/app/models}
      - PRICE_CACHE_TTL_SECONDS=${PRICE_CACHE_TTL_SECONDS:-86400}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SERVICE_NAME=price-prediction-service
    volumes:
      - ./price-prediction-service/models:/app/models:ro
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  recommendation-service:
    build:
      context: ./recommendation-service
      dockerfile: Dockerfile
    container_name: soko-ml-rec
    hostname: recommendation-service
    networks:
      - soko-ml-network
    ports:
      - "${REC_SERVICE_PORT:-8095}:8002"
    environment:
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-soko_ml}:${POSTGRES_PASSWORD:-changeme}@soko-ml-db:5432/soko_ml_db
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_INTERACTION_TOPIC=${KAFKA_INTERACTION_TOPIC:-soko.interactions}
      - REC_CACHE_TTL_SECONDS=${REC_CACHE_TTL_SECONDS:-3600}
      - DEFAULT_TOP_N=${DEFAULT_TOP_N:-5}
      - PROFILE_REFRESH_INTERVAL_SECONDS=${PROFILE_REFRESH_INTERVAL_SECONDS:-900}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-secret}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SERVICE_NAME=recommendation-service
    depends_on:
      soko-ml-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ml-gateway-service:
    build:
      context: ./ml-gateway-service
      dockerfile: Dockerfile
    container_name: soko-ml-gateway
    hostname: ml-gateway-service
    networks:
      soko-ml-network: {}
      soko-ml-bridge:
        aliases:
          - ml-gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8000"
    environment:
      - PRICE_SERVICE_URL=http://price-prediction-service:8001
      - REC_SERVICE_URL=http://recommendation-service:8002
      - LOCATION_SERVICE_URL=http://location-service:8003
      - INGEST_SERVICE_URL=http://data-ingestion-service:8004
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SERVICE_NAME=ml-gateway-service
    depends_on:
      price-prediction-service:
        condition: service_started
      recommendation-service:
        condition: service_started
      location-service:
        condition: service_started
      data-ingestion-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  data-ingestion-service:
    build:
      context: ./data-ingestion-service
      dockerfile: Dockerfile
    container_name: soko-ml-ingest
    hostname: data-ingestion-service
    networks:
      soko-ml-network: {}
      soko-ml-bridge:
        aliases:
          - data-ingestion-service
    ports:
      - "${INGEST_SERVICE_PORT:-8096}:8004"
    environment:
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-soko_ml}:${POSTGRES_PASSWORD:-changeme}@soko-ml-db:5432/soko_ml_db
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_TRANSACTION_TOPIC=${KAFKA_TRANSACTION_TOPIC:-soko.transactions}
      - KAFKA_ML_EVENTS_TOPIC=${KAFKA_ML_EVENTS_TOPIC:-soko.ml.events}
      - KAFKA_GAPS_TOPIC=${KAFKA_GAPS_TOPIC:-soko.gaps}
      - USER_SERVICE_URL=${USER_SERVICE_URL:-http://user_service:8002}
      - ORDER_SERVICE_URL=${ORDER_SERVICE_URL:-http://order_service:8004}
      - PRODUCE_SERVICE_URL=${PRODUCE_SERVICE_URL:-http://produce_service:8003}
      - LISTING_SERVICE_URL=${LISTING_SERVICE_URL:-http://produce_service:8003}
      - REC_SERVICE_URL=http://recommendation-service:8002
      - NOTIFICATION_SERVICE_URL=http://notification_service:8007
      - INTERNAL_API_KEY=${INTERNAL_API_KEY:-internal-secret}
      - BOOTSTRAP_ON_STARTUP=${BOOTSTRAP_ON_STARTUP:-true}
      - MIN_OBSERVATIONS_FOR_MODEL=${MIN_OBSERVATIONS_FOR_MODEL:-30}
      - PRICE_ANOMALY_SIGMA_THRESHOLD=${PRICE_ANOMALY_SIGMA_THRESHOLD:-3.0}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SERVICE_NAME=data-ingestion-service
    depends_on:
      soko-ml-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  location-service:
    build:
      context: ./location-service
      dockerfile: Dockerfile
    container_name: soko-ml-location
    hostname: location-service
    networks:
      - soko-ml-network
    ports:
      - "${LOCATION_SERVICE_PORT:-8097}:8003"
    environment:
      - POSTGRES_DSN=postgresql://${POSTGRES_USER:-soko_ml}:${POSTGRES_PASSWORD:-changeme}@soko-ml-db:5432/soko_ml_db
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - PRICE_SERVICE_URL=${PRICE_SERVICE_URL:-http://ml-gateway-service:8000}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - MAPS_DISTANCE_CACHE_TTL_SECONDS=${MAPS_DISTANCE_CACHE_TTL_SECONDS:-2592000}
      - GEO_FILTER_RELAX_FACTOR=${GEO_FILTER_RELAX_FACTOR:-1.5}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_GAPS_TOPIC=${KAFKA_GAPS_TOPIC:-soko.gaps}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SERVICE_NAME=location-service
    depends_on:
      soko-ml-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  kafka-agent:
    build:
      context: ./kafka-agent
      dockerfile: Dockerfile
    container_name: soko-ml-kafka-agent
    hostname: kafka-agent
    networks:
      - soko-ml-network
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_PRICE_REQUEST_TOPIC=${KAFKA_PRICE_REQUEST_TOPIC:-soko.price.requests}
      - KAFKA_PRICE_RESULT_TOPIC=${KAFKA_PRICE_RESULT_TOPIC:-soko.price.results}
      - KAFKA_TRANSACTION_TOPIC=${KAFKA_TRANSACTION_TOPIC:-soko.transactions}
      - KAFKA_INTERACTION_TOPIC=${KAFKA_INTERACTION_TOPIC:-soko.interactions}
      - KAFKA_ML_EVENTS_TOPIC=${KAFKA_ML_EVENTS_TOPIC:-soko.ml.events}
      - KAFKA_DLQ_TOPIC=${KAFKA_DLQ_TOPIC:-soko.dlq}
      - PRICE_SERVICE_URL=http://price-prediction-service:8001
      - REC_SERVICE_URL=http://recommendation-service:8002
      - DATA_INGESTION_SERVICE_URL=http://data-ingestion-service:8004
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SERVICE_NAME=kafka-agent
    depends_on:
      kafka:
        condition: service_healthy
      price-prediction-service:
        condition: service_healthy
      recommendation-service:
        condition: service_healthy
      data-ingestion-service:
        condition: service_healthy
    restart: unless-stopped
